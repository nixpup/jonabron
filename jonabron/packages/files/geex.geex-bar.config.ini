[colors]
background = #99282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #ffbf2d
marniePrimary = #ff2a54
helltakerPrimary = #FC2171
demePrimary = #E4810D
nixPrimary = #7db6e2
filianPrimary = #E0E0E0
secondary = #8ABEB7
alert = #A54242
disabled = #707880
accent-white = #f5e8d5
accent-white-transparent = #65f5e8d5
accent-green = #4CBF5A
accent-green-transparent = #654CBF5A
accent-green-light = #81D28B
accent-blue = #78BADC
accent-blue-transparent = #6578BADC
accent-blue-pastel = #bcedf5
accent-purple = #C23FAD
accent-purple-transparent = #65C23FAD
accent-red = #F04535
accent-red-transparent = #65F04535
accent-red-translucent = #85F04535
accent-red-dark = #FF6040
accent-red-dark-transparent = #65FF6040
accent-brown = #D4921A
accent-brown-transparent = #65D4921A

[bar/main]
width = 100%
height = 18pt
radius = 0
monitor = ${env:MONITOR:}
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2pt
border-size = 0pt
border-color = #00000000
padding-left = 0
padding-right = 1
module-margin = 4px
separator = ""
separator-foreground = ${colors.foreground}
locale = de_DE.UTF-8
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
font-0 = "TempleOS:size=8;2"
font-1 = "Symbols Nerd Font:size=14;2"
font-2 = "monospace:size=11;2"
font-3 = "DejaVu Sans Mono:size=14;2"

modules-left = icon xworkspaces outro memory separator cpu separator gpu separator disk-root separator disk-mnt
modules-right = pulseaudio separator inet separator xmonad-layout intro date
modules-center = xwindow

[module/intro]
type = custom/text
content = "<<"
content-font = 1
content-margin = 0px
content-foreground = ${colors.foreground}

[module/outro]
type = custom/text
content = ">>"
content-font = 1
content-margin = 0px
content-foreground = ${colors.foreground}

[module/separator]
type = custom/text
content = ":"
content-font = 1
content-margin = 0px
content-foreground = ${colors.accent-red}

[module/xmonad-layout]
type = custom/script
exec = tail -F /tmp/.xmonad-layout-log 2>/dev/null | sed -u 's/.*Spiral.*/Spiral/;s/.*Tall.*/Multi/;s/.*Tabbed.*/Tab/;s/.*Accordion.*/Accordion/;s/.*Circle.*/Circle/'
tail = true
label-font = 1
label =  %{F#81D28B}%output%%{F-}
format-foreground = ${colors.primary}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98
poll-interval = 5
format-charging = <label-charging>
format-discharging = <label-discharging>
format-full = <label-full>
label-charging = 󰢝 %{F-} %{F#81D28B}%percentage%%%{F-}
label-charging-foreground = ${colors.primary}
label-discharging = 󱟞 %{F-} %{F#81D28B}%percentage%%%{F-}
label-discharging-foreground = ${colors.primary}
label-full = 󰁹 %{F-} %{F#81D28B}Full%{F-}
label-full-foreground = ${colors.primary}

[module/icon]
type = custom/script
interval = 31556952
exec = bash -c 'pbarPid=$(pidof polybar | awk "{print \$1}"); if ps -o cmd -p "$pbarPid" > /dev/null 2>&1; then os="guix"; else os=$(grep -E "^(NAME|DISTRIB_ID)=" /etc/*-release 2>/dev/null | cut -d= -f2 | tr -d "\"" | tr "[:upper:]" "[:lower:]" | head -n1); fi; if [[ "$os" == *guix* ]] || command -v guix >/dev/null 2>&1; then echo "%{F#4CBF5A} "; elif [[ "$os" == *nix* ]] || command -v nix >/dev/null 2>&1; then echo "%{F#4CBF5A} "; else echo "%{F#4CBF5A} "; fi'
label = %output%
label-foreground = ${colors.accent-green}

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-foreground = ${colors.primary}
label-active-background = ${colors.accent-blue-transparent}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-occupied-foreground = ${colors.accent-blue}
label-occupied-background = ${colors.accent-purple-transparent}
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty =
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:10:...%

[module/disk-root]
type = custom/script
interval = 1
exec = bash -c 'state_file=/tmp/polybar_disk_root_state; [ -f "$state_file" ] || echo 0 > "$state_file"; state=$(cat "$state_file"); if [ "$state" -eq 0 ]; then df -h / | awk '"'"'NR==2 {print "%{F#ffbf2d}󰋊%{F#81D28B} " $5 }'"'"'; else df -h / | sed "s/G//g" | awk '"'"'NR==2 {print "%{F#ffbf2d}󰋊 %{F#bcedf5}[%{F#ffbf2d}/%{F#bcedf5}] %{F#bcedf5}[%{F#ffbf2d}" $3 "%{F#81D28B}GiB%{F#f5e8d5}/%{F#ffbf2d}" $2 "%{F#81D28B}GiB%{F#bcedf5}]"}'"'"'; fi'
click-left = bash -c 'state_file=/tmp/polybar_disk_root_state; state=$(cat "$state_file"); if [ "$state" -eq 0 ]; then echo 1 > "$state_file"; else echo 0 > "$state_file"; fi'
label = %output%
label-foreground = ${colors.primary}

[module/disk-mnt]
type = custom/script
interval = 1
exec = bash -c 'if df -h /mnt >/dev/null 2>&1; then state_file=/tmp/polybar_disk_mnt_state; [ -f "$state_file" ] || echo 0 > "$state_file"; state=$(cat "$state_file"); if [ "$state" -eq 0 ]; then df -h /mnt | awk '\''NR==2 {print "%{F#ffbf2d}󱁋%{F#81D28B} " $5 }'\''; else df -h /mnt | sed "s/G//g" | awk '\''NR==2 {print "%{F#ffbf2d}󱁋 %{F#bcedf5}[%{F#ffbf2d}/mnt%{F#bcedf5}] %{F#bcedf5}[%{F#ffbf2d}" $3 "%{F#81D28B}GiB%{F#f5e8d5}/%{F#ffbf2d}" $2 "%{F#81D28B}GiB%{F#bcedf5}]"}'\''; fi; else echo "%{F#f5e8d5}󱁌 %{F#F04535}No /mnt"; fi'
click-left = bash -c 'state_file=/tmp/polybar_disk_mnt_state; state=$(cat "$state_file"); if [ "$state" -eq 0 ]; then echo 1 > "$state_file"; else echo 0 > "$state_file"; fi'
label = %output%
label-foreground = ${colors.primary}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = " "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
format-volume-foreground = ${colors.primary}
label-volume = %{F#81D28B}%percentage%%
label-volume-foreground = ${colors.primary}
label-muted = %{F#f5e8d5} %{F#F04535}Mute%{F-}
label-muted-foreground = ${colors.primary}
click-right = pavucontrol

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
label-layout = %layout%
label-layout-foreground = ${colors.primary}
label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = custom/script
interval = 5
exec = echo "%{F#ffbf2d} %{F#81D28B}$(awk '/^MemTotal:/ { t=$2 } /^MemAvailable:/ { a=$2 } END { printf("%.0f%%\n", (t-a)/t*100) }' /proc/meminfo)"
label = %output%
click-right = kitty --title FLOAT_ME_NOW -o font_family=TempleOS -o font_size=8 btop & kittyPid=$! && notify-send "Polybar" "Launched BTop in Kitty Terminal (PID: $kittyPid)"

[module/cpu]
type = custom/script
interval = 5
exec = echo "%{F#81D28B}$(mpstat 1 1 | awk '$12 ~ /[0-9.]+/ { print 100 - $12 }' | awk 'NR==2' | awk '{printf "%.0f\n", $1}')%"
label =  %output%
label-foreground = ${colors.primary}
click-right = kitty --title FLOAT_ME_NOW -o font_family=TempleOS -o font_size=8 btm --theme gruvbox & kittyPid=$\! && notify-send "Polybar" "Launched Bottom in Kitty Terminal (PID: $kittyPid)"

[module/gpu]
type = custom/script
interval = 30
exec = bash -c 'if command -v nvidia-smi > /dev/null; then nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits | awk '"'"'{print "%{F#ffbf2d} %{F#81D28B}" $1"%"}'"'"'; else echo "%{F#f5e8d5} %{F#F04535}No GPU%{F-}"; fi'
label = %output%
label-foreground = ${colors.primary}
click-right = kitty --title FLOAT_ME_NOW -o font_family=TempleOS -o font_size=8 bash -c 'watch -n 1 nvidia-smi & WATCH_PID=$!; read -n 1 -s; kill $WATCH_PID' & notify-send "Polybar" "Launched Nvidia-SMI in Kitty Terminal"

[module/inet]
type = custom/script
interval = 960
exec = bash -c 'NM=$(if [ -x "/run/current-system/sw/bin/nmcli" ]; then echo "/run/current-system/sw/bin/nmcli"; else echo "nmcli"; fi); dev_info=$($NM -t -f DEVICE,TYPE,STATE,CONNECTION dev | grep ":connected" | grep -Ev "^(lo|docker|virbr|veth):" | head -n1); if [ -z "$dev_info" ]; then echo "%{F#f5e8d5}󱚼 %{F#F04535}Disconnected"; else IFS=: read -r dev type state conn <<< "$dev_info"; case "$type" in ethernet) ip=$($NM -g IP4.ADDRESS device show "$dev" | cut -d/ -f1 | head -n1); echo "󰈀 %{F#81D28B}$ip"; ;; wifi) echo "󰖩 %{F#81D28B}$conn"; ;; *) echo "󱚼 %{F#81D28B}Connected"; ;; esac; fi'
label = %output%
label-foreground = ${colors.primary}
click-right = kitty --title FLOAT_ME_NOW -o font_family=TempleOS -o font_size=8 bash -c 'watch -n 1 '"'"'echo -e "NmCLI Devices\n=============\n$(nmcli device show | tee)\n\nNmCLI Connections\n=================\n$(nmcli connection show | tee)"'"'"' & WATCH_PID=$!; read -n 1 -s; kill $WATCH_PID' & notify-send "Polybar" "Launched NmCLI info in Kitty Terminal"

[module/date]
type = custom/script
exec = bash -c 'S="$HOME/.cache/polybar-date-toggle"; [ ! -f "$S" ] && echo "normal" > "$S"; M="$1"; case "$M" in switch) C=$(cat "$S"); if [ "$C" = "normal" ]; then echo "alt" > "$S"; elif [ "$C" = "alt" ]; then echo "short" > "$S"; else echo "normal" > "$S"; fi; polybar-msg hook date 1 ;; reset) echo "normal" > "$S"; echo "%{F#FFBF2D}󰭨 %{F#81D28B}$(date +"%a %d.%m") %{F#FFBF2D} %{F#81D28B}$(date +"%H:%M")" ;; *) T=$(cat "$S"); if [ "$T" = "normal" ]; then echo "%{F#FFBF2D}󰭨 %{F#81D28B}$(date +"%a %d.%m") %{F#FFBF2D} %{F#81D28B}$(date +"%H:%M")"; elif [ "$T" = "alt" ]; then echo "%{F#FFBF2D} %{F#81D28B}$(date +"%H:%M")"; else D=$(date +"%A, %d. %B" | sed "s/ä/a/g;s/ö/o/g;s/ü/u/g;s/Ä/a/g;s/Ü/u/g;s/Ö/o/g"); echo "%{F#FFBF2D}󰭨 %{F#81D28B}${D} %{F#FFBF2D} %{F#81D28B}$(date +"%H:%M:%S")"; fi ;; esac' -- "output"
interval = 1
label = %output%
click-left = bash -c 'S="$HOME/.cache/polybar-date-toggle"; [ ! -f "$S" ] && echo "normal" > "$S"; M="$1"; case "$M" in switch) C=$(cat "$S"); if [ "$C" = "normal" ]; then echo "alt" > "$S"; elif [ "$C" = "alt" ]; then echo "short" > "$S"; else echo "normal" > "$S"; fi; polybar-msg hook date 1 ;; reset) echo "normal" > "$S"; echo "%{F#FFBF2D}󰭨 %{F#81D28B}$(date +"%a %d.%m") %{F#FFBF2D} %{F#81D28B}$(date +"%H:%M")" ;; *) T=$(cat "$S"); if [ "$T" = "normal" ]; then echo "%{F#FFBF2D}󰭨 %{F#81D28B}$(date +"%a %d.%m") %{F#FFBF2D} %{F#81D28B}$(date +"%H:%M")"; elif [ "$T" = "alt" ]; then echo "%{F#FFBF2D} %{F#81D28B}$(date +"%H:%M")"; else D=$(date +"%A, %d. %B" | sed "s/ä/a/g;s/ö/o/g;s/ü/u/g;s/Ä/a/g;s/Ü/u/g;s/Ö/o/g"); echo "%{F#FFBF2D}󰭨 %{F#81D28B}${D} %{F#FFBF2D} %{F#81D28B}$(date +"%H:%M:%S")"; fi ;; esac' -- "switch"
click-right = bash -c 'S="$HOME/.cache/polybar-date-toggle"; [ ! -f "$S" ] && echo "normal" > "$S"; M="$1"; case "$M" in switch) C=$(cat "$S"); if [ "$C" = "normal" ]; then echo "alt" > "$S"; elif [ "$C" = "alt" ]; then echo "short" > "$S"; else echo "normal" > "$S"; fi; polybar-msg hook date 1 ;; reset) echo "normal" > "$S"; echo "%{F#FFBF2D}󰭨 %{F#81D28B}$(date +"%a %d.%m") %{F#FFBF2D} %{F#81D28B}$(date +"%H:%M")" ;; *) T=$(cat "$S"); if [ "$T" = "normal" ]; then echo "%{F#FFBF2D}󰭨 %{F#81D28B}$(date +"%a %d.%m") %{F#FFBF2D} %{F#81D28B}$(date +"%H:%M")"; elif [ "$T" = "alt" ]; then echo "%{F#FFBF2D} %{F#81D28B}$(date +"%H:%M")"; else D=$(date +"%A, %d. %B" | sed "s/ä/a/g;s/ö/o/g;s/ü/u/g;s/Ä/a/g;s/Ü/u/g;s/Ö/o/g"); echo "%{F#FFBF2D}󰭨 %{F#81D28B}${D} %{F#FFBF2D} %{F#81D28B}$(date +"%H:%M:%S")"; fi ;; esac' -- "reset"
hook-0 = 1
label-font = 2

[module/tray]
type = internal/tray
format-margin = 6px
tray-spacing = 8px

[settings]
screenchange-reload = true
pseudo-transparency = true
