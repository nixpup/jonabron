[bar/tray-bar]
monitor = ${env:MONITOR:}
width = 10%
height = 18pt
offset-x = 85%
offset-y = 18pt
override-redirect = true
fixed-center = true
background = ${colors.background}
padding = 1
module-margin = 1

modules-center = tray

[module/tray]
type = internal/tray
tray-spacing = 8px
